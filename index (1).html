<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم — مصحف التجويد</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --fs: 26px;
      --gold: #c8a951;
      --page-bg: #fdf8ed;
      --border: #9b7722;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1c1008;
      font-family: 'Scheherazade New', 'Traditional Arabic', serif;
      direction: rtl;
      min-height: 100vh;
    }

    /* ══ HEADER ══════════════════════════════════════════════════════════ */
    header {
      background: linear-gradient(135deg, #0c3520, #155233);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 2px solid var(--gold);
    }

    .hdr-title {
      color: var(--gold);
      font-size: 1.45rem;
      font-weight: 700;
    }
    .hdr-title small {
      display: block;
      font-size: 0.7rem;
      color: #aaa;
      font-family: sans-serif;
      font-weight: 400;
    }

    .hdr-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .font-box {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 4px 10px;
    }
    .font-box span {
      color: #ddd;
      font-size: 0.8rem;
      font-family: sans-serif;
      min-width: 52px;
      text-align: center;
    }
    .ibtn {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      width: 26px; height: 26px;
      border-radius: 5px;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
    }
    .ibtn:hover { background: rgba(255,255,255,.3); }

    select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      cursor: pointer;
    }
    select option { background: #1a1a1a; }

    audio { height: 34px; width: 190px; }

    /* ══ LEGEND ══════════════════════════════════════════════════════════ */
    .legend {
      background: rgba(0,0,0,.4);
      padding: 7px 16px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .li {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #ccc;
      cursor: default;
    }
    .lc { width: 11px; height: 11px; border-radius: 2px; }

    /* ══ NAV BAR ═════════════════════════════════════════════════════════ */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 18px;
      background: rgba(0,0,0,.35);
    }
    .nbtn {
      background: var(--gold);
      color: #1a0e00;
      border: none;
      padding: 5px 18px;
      border-radius: 7px;
      cursor: pointer;
      font-family: sans-serif;
      font-weight: bold;
      font-size: 0.88rem;
    }
    .nbtn:hover { filter: brightness(1.1); }
    .nbtn:disabled { opacity: .3; cursor: not-allowed; }
    .pinfo { color: var(--gold); font-family: sans-serif; font-size: 0.82rem; text-align: center; }

    /* ══ MUSHAF SPREAD ════════════════════════════════════════════════════ */
    .spread {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 14px 10px;
      max-width: 1380px;
      margin: 0 auto;
    }

    .mpage {
      background: var(--page-bg);
      border: 3px solid var(--border);
      border-radius: 3px;
      width: 48%;
      max-width: 590px;
      min-height: 78vh;
      padding: 22px 26px;
      position: relative;
      box-shadow: 4px 4px 18px rgba(0,0,0,.5);
      display: flex;
      flex-direction: column;
    }

    .mpage::before {
      content: '';
      position: absolute;
      inset: 7px;
      border: 1px solid #c8a95155;
      pointer-events: none;
      border-radius: 1px;
    }

    .pg-header, .pg-footer {
      text-align: center;
      color: #7a5510;
      font-size: 0.7rem;
      font-family: sans-serif;
      padding: 4px 0;
    }
    .pg-header { border-bottom: 1px solid #c8a95144; margin-bottom: 10px; }
    .pg-footer { border-top:    1px solid #c8a95144; margin-top:    10px; }

    .surah-bar {
      text-align: center;
      font-size: 1.1em;
      font-weight: 700;
      color: #4a2800;
      padding: 5px 0;
      margin: 6px 0;
      border-top: 1px solid #c8a95155;
      border-bottom: 1px solid #c8a95155;
    }

    .basmala {
      text-align: center;
      font-size: 1em;
      color: #1a1a1a;
      margin: 6px 0 10px;
    }

    .page-body {
      flex: 1;
      font-size: var(--fs);
      line-height: 2.5;
      text-align: justify;
      color: #111;
      direction: rtl;
      word-spacing: 2px;
    }

    .anum {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55em;
      color: #7a5510;
      cursor: pointer;
      vertical-align: middle;
      margin: 0 2px;
      transition: color .15s;
      font-family: 'Scheherazade New', serif;
    }
    .anum:hover { color: #c8a951; }

    /* ══ TAJWEED COLORS ══════════════════════════════════════════════════ */
    tajweed { position: relative; }

    tajweed.ham_wasl           { color: #aaa; }
    tajweed.slnt               { color: #bbb; font-size: .65em; vertical-align: super; }
    tajweed.madda_normal       { color: #2255cc; }
    tajweed.madda_permissible  { color: #1144bb; font-weight: bold; }
    tajweed.madda_necessary    { color: #0033aa; font-weight: bold; }
    tajweed.qalaqah            { color: #b06000; }
    tajweed.ikhafa_shafawi     { color: #cc00aa; }
    tajweed.ikhafa             { color: #1a8c1a; }
    tajweed.idghaam_shafawi    { color: #44aa00; }
    tajweed.idghaam_ghunnah    { color: #007700; }
    tajweed.idghaam_wo_ghunnah { color: #1d5200; }
    tajweed.iqlab              { color: #770077; }
    tajweed.ghunnah            { color: #cc5500; }

    tajweed[data-tip] { cursor: help; }
    tajweed[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 4px);
      right: 50%;
      transform: translateX(50%);
      background: #111;
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.58rem;
      white-space: nowrap;
      z-index: 200;
      pointer-events: none;
      font-family: 'Scheherazade New', serif;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    /* ══ LOADING / ERROR ════════════════════════════════════════════════ */
    .msg {
      text-align: center;
      color: #888;
      font-family: sans-serif;
      font-size: 0.9rem;
      padding: 30px 10px;
    }

    /* ══ RESPONSIVE ═════════════════════════════════════════════════════ */
    @media (max-width: 720px) {
      .spread { flex-direction: column; align-items: center; }
      .mpage  { width: 100%; max-width: 100%; }
      audio   { width: 140px; }
      header  { gap: 6px; }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr-title">
    القرآن الكريم
    <small>مصحف التجويد الكامل — اضغط ﴿رقم الآية﴾ للاستماع</small>
  </div>

  <div class="hdr-controls">
    <div class="font-box">
      <button class="ibtn" onclick="changeFS(-2)">−</button>
      <span id="fsLabel">26px</span>
      <button class="ibtn" onclick="changeFS(+2)">+</button>
    </div>

    <select id="sheikhSel">
      <option value="Alafasy_128kbps">مشاري راشد العفاسي</option>
      <option value="Abdul_Basit_Murattal_192kbps">عبد الباسط عبد الصمد</option>
      <option value="Husary_128kbps">محمود خليل الحصري</option>
      <option value="Minshawi_Murattal_128kbps">محمد صديق المنشاوي</option>
      <option value="Ghamadi_40kbps">سعد الغامدي</option>
    </select>

    <audio id="audio" controls></audio>
  </div>
</header>

<div class="legend">
  <div class="li"><span class="lc" style="background:#1a8c1a"></span>إخفاء</div>
  <div class="li"><span class="lc" style="background:#770077"></span>إقلاب</div>
  <div class="li"><span class="lc" style="background:#007700"></span>إدغام بغنة</div>
  <div class="li"><span class="lc" style="background:#1d5200"></span>إدغام بغير غنة</div>
  <div class="li"><span class="lc" style="background:#cc00aa"></span>إخفاء شفوي</div>
  <div class="li"><span class="lc" style="background:#44aa00"></span>إدغام شفوي</div>
  <div class="li"><span class="lc" style="background:#cc5500"></span>غنة</div>
  <div class="li"><span class="lc" style="background:#b06000"></span>قلقلة</div>
  <div class="li"><span class="lc" style="background:#2255cc"></span>مدّ</div>
  <div class="li"><span class="lc" style="background:#aaa"></span>همزة وصل / صامت</div>
</div>

<div class="nav-bar">
  <button class="nbtn" id="prevBtn" onclick="go(-2)" disabled>◄ السابق</button>
  <div class="pinfo" id="pinfo">—</div>
  <button class="nbtn" id="nextBtn" onclick="go(+2)">التالي ►</button>
</div>

<div class="spread">
  <div class="mpage" id="pageRight"><div class="msg">جارٍ التحميل…</div></div>
  <div class="mpage" id="pageLeft" ><div class="msg">جارٍ التحميل…</div></div>
</div>

<div class="nav-bar">
  <button class="nbtn" onclick="go(-2)">◄ السابق</button>
  <div class="pinfo" id="pinfo2">—</div>
  <button class="nbtn" onclick="go(+2)">التالي ►</button>
</div>

<script>
const TOTAL = 604;
const BASE  = 'https://api.alquran.cloud/v1/page/';
const EVERYAYAH = 'https://everyayah.com/data/';

const RULE_TIPS = {
  ham_wasl:           'همزة وصل — تُوصَل بما قبلها ولا تُنطق ابتداءً',
  slnt:               'حرف صامت — لا يُنطق',
  madda_normal:       'مدّ طبيعي — حركتان',
  madda_permissible:  'مدّ جائز منفصل — 4 أو 5 حركات',
  madda_necessary:    'مدّ لازم — 6 حركات',
  qalaqah:            'قلقلة — اهتزاز عند النطق بالساكن (ق ط ب ج د)',
  ikhafa_shafawi:     'إخفاء شفوي — م ساكنة قبل الباء',
  ikhafa:             'إخفاء — ن ساكنة أو تنوين قبل حروف الإخفاء الخمسة عشر',
  idghaam_shafawi:    'إدغام شفوي — م ساكنة قبل م',
  idghaam_ghunnah:    'إدغام بغنة — ن ساكنة / تنوين قبل ي ن م و',
  idghaam_wo_ghunnah: 'إدغام بغير غنة — ن ساكنة / تنوين قبل ل ر',
  iqlab:              'إقلاب — ن ساكنة / تنوين قبل ب → تُقلب إلى م',
  ghunnah:            'غنة — ن أو م مشددة (حركتان)',
};

let curPage  = 1;
let fontSize = 26;
const cache  = {};

const toAr = n => String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

function changeFS(d) {
  fontSize = Math.max(16, Math.min(46, fontSize + d));
  document.documentElement.style.setProperty('--fs', fontSize + 'px');
  document.getElementById('fsLabel').textContent = fontSize + 'px';
}

function go(delta) {
  const p = curPage + delta;
  if (p < 1 || p > TOTAL) return;
  curPage = p;
  loadSpread();
}

function syncNav() {
  const r = curPage, l = Math.min(curPage + 1, TOTAL);
  const txt = `صفحة ${toAr(r)} — ${toAr(l)}  |  من ${toAr(604)} صفحة`;
  document.getElementById('pinfo').textContent  = txt;
  document.getElementById('pinfo2').textContent = txt;
  document.getElementById('prevBtn').disabled = curPage <= 1;
  document.getElementById('nextBtn').disabled = curPage >= TOTAL - 1;
}

async function fetchPage(num) {
  if (cache[num]) return cache[num];
  if (num < 1 || num > TOTAL) return null;
  try {
    let res = await fetch(BASE + num + '/quran-uthmani');
    let json = await res.json();
    if (json.code === 200) { cache[num] = json.data; return json.data; }
  } catch (_) {}
  return null;
}

function injectTips(text) {
  // text is plain Uthmani Arabic — return as-is (no tajweed markup to parse)
  return text;
}

function renderPage(data) {
  if (!data || !data.ayahs || !data.ayahs.length) {
    return '<div class="msg">تعذّر تحميل الصفحة<br>تحقق من اتصال الإنترنت</div>';
  }

  const ayahs  = data.ayahs;
  const pgNum  = ayahs[0].page;
  const juzNum = ayahs[0].juz;

  let html = `<div class="pg-header">جزء ${toAr(juzNum)} &nbsp;·&nbsp; صفحة ${toAr(pgNum)}</div>`;
  html += `<div class="page-body" dir="rtl">`;

  let lastSurah = -1;

  ayahs.forEach(ayah => {
    const sNum = ayah.surah.number;
    const aNum = ayah.numberInSurah;

    if (sNum !== lastSurah) {
      lastSurah = sNum;
      html += `</div><div class="surah-bar">سورة ${ayah.surah.name}</div><div class="page-body" dir="rtl">`;
      if (sNum !== 9 && sNum !== 1 && aNum === 1) {
        html += `<div class="basmala">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَـٰنِ ٱلرَّحِيمِ</div>`;
      }
    }

    const text = injectTips(ayah.text);
    html += `${text}<span class="anum" data-s="${sNum}" data-a="${aNum}" title="استمع للآية ${toAr(aNum)}">﴿${toAr(aNum)}﴾</span> `;
  });

  html += `</div>`;
  html += `<div class="pg-footer">اضغط على ﴿رقم الآية﴾ للاستماع</div>`;
  return html;
}

async function loadSpread() {
  syncNav();
  const rEl = document.getElementById('pageRight');
  const lEl = document.getElementById('pageLeft');
  rEl.innerHTML = '<div class="msg">جارٍ التحميل…</div>';
  lEl.innerHTML = '<div class="msg">جارٍ التحميل…</div>';

  const [rData, lData] = await Promise.all([
    fetchPage(curPage),
    fetchPage(curPage + 1),
  ]);

  rEl.innerHTML = renderPage(rData);
  lEl.innerHTML = curPage + 1 <= TOTAL ? renderPage(lData) : '';

  document.querySelectorAll('.anum').forEach(el => {
    el.addEventListener('click', () => playAyah(+el.dataset.s, +el.dataset.a));
  });
}

function playAyah(surah, ayah) {
  const sheikh = document.getElementById('sheikhSel').value;
  const s = String(surah).padStart(3, '0');
  const a = String(ayah).padStart(3, '0');
  document.getElementById('audio').src = `${EVERYAYAH}${sheikh}/${s}${a}.mp3`;
  document.getElementById('audio').play();
}

loadSpread();
</script>
</body>
</html>
