<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم — مصحف التجويد</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; --fs: 22px; --gold: #c8a951; --page-bg: #fdf8ed; --border: #9b7722; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1c1008; font-family: 'Scheherazade New','Traditional Arabic',serif; direction: rtl; min-height: 100vh; }

    /* ══ HEADER ══ */
    header { background: linear-gradient(135deg,#0c3520,#155233); padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; border-bottom: 2px solid var(--gold); }
    .hdr-title { color: var(--gold); font-size: 1.3rem; font-weight: 700; }
    .hdr-title small { display: block; font-size: 0.65rem; color: #aaa; font-family: sans-serif; font-weight: 400; }
    .hdr-ctrl { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .font-box { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 4px 10px; }
    .font-box span { color: #ddd; font-size: 0.75rem; font-family: sans-serif; min-width: 44px; text-align: center; }
    .ibtn { background: rgba(255,255,255,.15); border: none; color: #fff; width: 26px; height: 26px; border-radius: 5px; font-size: 1.1rem; cursor: pointer; }
    .ibtn:hover { background: rgba(255,255,255,.3); }
    select { padding: 5px 9px; border-radius: 8px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); color: #fff; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
    select option { background: #1a1a1a; }
    audio { height: 32px; width: 175px; }

    /* ══ LEGEND ══ */
    .legend { background: rgba(0,0,0,.4); padding: 6px 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; border-bottom: 1px solid rgba(255,255,255,.06); }
    .li { display: flex; align-items: center; gap: 4px; font-size: 0.73rem; color: #ccc; }
    .lc { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-note { color: #888; font-size: 0.68rem; font-family: sans-serif; }

    /* ══ NAV ══ */
    .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 14px; background: rgba(0,0,0,.35); }
    .nbtn { background: var(--gold); color: #1a0e00; border: none; padding: 5px 14px; border-radius: 7px; cursor: pointer; font-family: sans-serif; font-weight: bold; font-size: 0.82rem; }
    .nbtn:hover { filter: brightness(1.1); }
    .nbtn:disabled { opacity: .3; cursor: not-allowed; }
    .pinfo { color: var(--gold); font-family: sans-serif; font-size: 0.78rem; text-align: center; }

    /* ══ SPREAD ══ */
    .spread { display: flex; justify-content: center; gap: 8px; padding: 10px 6px; max-width: 1380px; margin: 0 auto; }

    /* ══ MUSHAF PAGE ══ */
    .mpage {
      background: var(--page-bg);
      border: 3px solid var(--border);
      border-radius: 3px;
      width: 48%;
      max-width: 590px;
      min-height: 76vh;
      padding: 14px 20px 10px;
      position: relative;
      box-shadow: 4px 4px 18px rgba(0,0,0,.5);
      display: flex;
      flex-direction: column;
    }
    .mpage::before { content:''; position: absolute; inset: 5px; border: 1px solid #c8a95140; pointer-events: none; }

    .pg-header, .pg-footer {
      text-align: center; color: #7a5510; font-size: 0.65rem;
      font-family: sans-serif; padding: 3px 0; flex-shrink: 0;
    }
    .pg-header { border-bottom: 1px solid #c8a95133; margin-bottom: 6px; }
    .pg-footer { border-top:    1px solid #c8a95133; margin-top:    6px; }

    /* ══ 15 LINES ══ */
    .lines-wrap { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

    .quran-line {
      display: flex;
      flex-direction: row;           /* RTL so words go right→left */
      justify-content: space-between;
      align-items: flex-end;
      min-height: calc((76vh - 70px) / 15);
      padding: 0 2px;
    }
    .quran-line.center { justify-content: center; gap: 6px; }

    /* special surah-name line */
    .surah-name-line {
      text-align: center;
      font-size: 0.9em;
      font-weight: 700;
      color: #4a2800;
      border-top: 1px solid #c8a95155;
      border-bottom: 1px solid #c8a95155;
      padding: 2px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ══ TAJWEED WORD ══ */
    .tw { display: inline-flex; flex-direction: column; align-items: center; }
    .tw-ann { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 22px; margin-bottom: 1px; }

    .tw-label {
      font-size: 0.38rem; font-weight: bold;
      padding: 1px 4px; border-radius: 3px;
      color: #fff; white-space: nowrap; line-height: 1.4;
      font-family: 'Scheherazade New', serif;
      cursor: pointer;
      transition: transform .1s, filter .15s;
      user-select: none;
    }
    .tw-label:hover { filter: brightness(1.2); transform: scale(1.1); }
    .tw-label:active { transform: scale(.9); }

    .tw-reason { font-size: 0.32rem; color: #888; white-space: nowrap; line-height: 1.2; font-family: 'Scheherazade New', serif; }
    .tw-text   { font-size: var(--fs); line-height: 1.15; white-space: nowrap; }

    /* RULE COLORS */
    .ikh .tw-label { background: #217a21; } .ikh .tw-text { color: #217a21; }
    .iq  .tw-label { background: #660077; } .iq  .tw-text { color: #660077; }
    .idg .tw-label { background: #0070aa; } .idg .tw-text { color: #0070aa; }
    .idb .tw-label { background: #005e50; } .idb .tw-text { color: #005e50; }
    .it  .tw-label { background: #5c3a10; } .it  .tw-text { color: #5c3a10; }
    .ql  .tw-label { background: #7a0040; } .ql  .tw-text { color: #7a0040; }
    .gh  .tw-label { background: #b01060; } .gh  .tw-text { color: #b01060; }
    .iks .tw-label { background: #9900aa; } .iks .tw-text { color: #9900aa; }
    .idm .tw-label { background: #004400; } .idm .tw-text { color: #004400; }

    /* AYAH NUMBER */
    .anum { font-size: 0.55em; color: #8b6512; cursor: pointer; margin: 0 1px; font-family: 'Scheherazade New', serif; flex-shrink: 0; }
    .anum:hover { color: #c8a951; }

    /* ══ RULE POPUP ══ */
    #popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      color: #fff;
      padding: 16px 20px;
      border-radius: 12px;
      border: 2px solid var(--gold);
      z-index: 9999;
      min-width: 260px;
      max-width: 320px;
      text-align: right;
      direction: rtl;
      box-shadow: 0 8px 30px rgba(0,0,0,.7);
      animation: popIn .2s ease;
    }
    @keyframes popIn { from{transform:translate(-50%,-50%) scale(.8);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }

    #popup .pop-rule  { font-size: 1.3rem; font-weight: bold; color: #f0d060; margin-bottom: 8px; }
    #popup .pop-rsn   { font-size: 0.82rem; color: #aaa; margin-bottom: 10px; font-family: sans-serif; }
    #popup .pop-body  { font-size: 0.95rem; color: #eee; line-height: 1.8; }
    #popup .pop-close { position: absolute; top: 8px; left: 12px; background: none; border: none; color: #aaa; font-size: 1.1rem; cursor: pointer; }
    #popup .pop-close:hover { color: #fff; }

    #overlay { display: none; position: fixed; inset: 0; z-index: 9998; }

    .msg { text-align: center; color: #888; font-family: sans-serif; font-size: 0.85rem; padding: 30px 10px; }

    @media (max-width: 720px) {
      .spread { flex-direction: column; align-items: center; }
      .mpage  { width: 100%; max-width: 100%; }
      audio   { width: 130px; }
    }
  </style>
</head>
<body>

<!-- ══ RULE POPUP ══ -->
<div id="overlay" onclick="closePopup()"></div>
<div id="popup">
  <button class="pop-close" onclick="closePopup()">✕</button>
  <div class="pop-rule"  id="popRule"></div>
  <div class="pop-rsn"   id="popRsn"></div>
  <div class="pop-body"  id="popBody"></div>
</div>

<header>
  <div class="hdr-title">
    القرآن الكريم
    <small>15 سطراً كالمصحف — اضغط اسم الحكم للشرح 🔊</small>
  </div>
  <div class="hdr-ctrl">
    <div class="font-box">
      <button class="ibtn" onclick="changeFS(-2)">−</button>
      <span id="fsLabel">22px</span>
      <button class="ibtn" onclick="changeFS(+2)">+</button>
    </div>
    <select id="sheikhSel">
      <option value="Alafasy_128kbps">مشاري راشد العفاسي</option>
      <option value="Abdul_Basit_Murattal_192kbps">عبد الباسط عبد الصمد</option>
      <option value="Husary_128kbps">محمود خليل الحصري</option>
      <option value="Minshawi_Murattal_128kbps">محمد صديق المنشاوي</option>
      <option value="Ghamadi_40kbps">سعد الغامدي</option>
    </select>
    <audio id="audio" controls></audio>
  </div>
</header>

<div class="legend">
  <div class="li"><span class="lc" style="background:#217a21"></span>إخفاء</div>
  <div class="li"><span class="lc" style="background:#660077"></span>إقلاب</div>
  <div class="li"><span class="lc" style="background:#0070aa"></span>إدغام بغنة</div>
  <div class="li"><span class="lc" style="background:#005e50"></span>إدغام بغير غنة</div>
  <div class="li"><span class="lc" style="background:#9900aa"></span>إخفاء شفوي</div>
  <div class="li"><span class="lc" style="background:#004400"></span>إدغام شفوي</div>
  <div class="li"><span class="lc" style="background:#b01060"></span>غنة</div>
  <div class="li"><span class="lc" style="background:#7a0040"></span>قلقلة</div>
  <div class="li"><span class="lc" style="background:#5c3a10"></span>إظهار حلقي</div>
  <span class="legend-note">🔊 اضغط الحكم للشرح | اضغط ﴿رقم الآية﴾ للاستماع</span>
</div>

<div class="nav-bar">
  <button class="nbtn" id="prevBtn" onclick="go(-2)" disabled>◄ السابق</button>
  <div class="pinfo" id="pinfo">—</div>
  <button class="nbtn" id="nextBtn" onclick="go(+2)">التالي ►</button>
</div>

<div class="spread">
  <div class="mpage" id="pageRight"><div class="msg">جارٍ التحميل…</div></div>
  <div class="mpage" id="pageLeft" ><div class="msg">جارٍ التحميل…</div></div>
</div>

<div class="nav-bar">
  <button class="nbtn" onclick="go(-2)">◄ السابق</button>
  <div class="pinfo" id="pinfo2">—</div>
  <button class="nbtn" onclick="go(+2)">التالي ►</button>
</div>

<script>
// ══ CONSTANTS ═════════════════════════════════════════════════════════════════
const TOTAL = 604;
const QCDN  = 'https://api.qurancdn.com/api/qdc/verses/by_page?page_number=';
const QCDN_FIELDS = '&word_fields=text_uthmani%2Cchar_type_name%2Clocation%2Cverse_key%2Cpage_number%2Cline_number&per_page=50&fields=text_uthmani%2Cverse_key%2Cchapter_id%2Cjuz_number%2Cpage_number';
const EVA   = 'https://everyayah.com/data/';

// ══ TAJWEED SETS ══════════════════════════════════════════════════════════════
const IG = new Set([...'ينمو']);
const IB = new Set([...'لر']);
const IZ = new Set([...'ءهعغحخ']);
const SKN = 'ْ'; // سكون

// ══ POPUP & SPEECH ════════════════════════════════════════════════════════════
const EXPLANATIONS = {
  ikh: { title: 'إخفاء', body: 'النون الساكنة أو التنوين إذا جاء بعدهما أحد حروف الإخفاء الخمسة عشر، وُجب إخفاؤهما مع بقاء الغنة. وحروف الإخفاء هي: ت ث ج د ذ ز س ش ص ض ط ظ ف ق ك' },
  iq:  { title: 'إقلاب', body: 'إذا جاء بعد النون الساكنة أو التنوين حرفُ الباء، وجب قلبُهما ميماً مع الغنة والإخفاء. مثال: مِن بَعْد' },
  idg: { title: 'إدغام بغنة', body: 'إذا جاء بعد النون الساكنة أو التنوين أحدُ حروف (ي ن م و) وجب إدغامهما في ذلك الحرف مع بقاء الغنة. مثال: هُدًى لِّلْمُتَّقِينَ' },
  idb: { title: 'إدغام بغير غنة', body: 'إذا جاء بعد النون الساكنة أو التنوين حرفُ اللام أو الراء، وجب إدغامهما بدون غنة. مثال: مِن رَّبِّهِمْ' },
  it:  { title: 'إظهار حلقي', body: 'إذا جاء بعد النون الساكنة أو التنوين أحدُ حروف الحلق الستة (ء ه ع غ ح خ)، وجب إظهارهما وإخراجهما واضحَين. مثال: أَنْعَمْتَ' },
  ql:  { title: 'قلقلة', body: 'اهتزاز في الصوت عند النطق بأحد حروف القلقلة (ق ط ب ج د) حال سكونها. وهي أشد وضوحاً عند الوقف. مثال: نَخْلُقكُّم' },
  gh:  { title: 'غنة', body: 'صوت أغنّ يخرج من الخيشوم عند النطق بالنون أو الميم المشددتين، ومقدارها حركتان. مثال: إنَّ، أمَّا' },
  iks: { title: 'إخفاء شفوي', body: 'إذا جاء بعد الميم الساكنة حرفُ الباء، وجب إخفاء الميم مع الغنة. وسُمِّي شفوياً لأنه يخرج من الشفتين. مثال: تَرْمِيهِم بِحِجَارَة' },
  idm: { title: 'إدغام شفوي', body: 'إذا جاء بعد الميم الساكنة ميمٌ أخرى، وجب إدغام الميم فيها مع الغنة. وسُمِّي شفوياً لأنه يخرج من الشفتين. مثال: لَهُم مَّا' },
};

let popupTimer;

function showPopup(cls, lbl, rsn) {
  const exp = EXPLANATIONS[cls];
  document.getElementById('popRule').textContent = exp ? exp.title : lbl;
  document.getElementById('popRsn').textContent  = rsn;
  document.getElementById('popBody').textContent = exp ? exp.body  : '';

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('popup').style.display   = 'block';

  clearTimeout(popupTimer);
  popupTimer = setTimeout(closePopup, 8000);

  // Try speech synthesis
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const txt  = exp ? `${exp.title}. ${exp.body}` : `${lbl}. ${rsn}`;
    const utt  = new SpeechSynthesisUtterance(txt);
    utt.lang   = 'ar-SA';
    utt.rate   = 0.88;
    const voices = window.speechSynthesis.getVoices();
    const arV  = voices.find(v => v.lang.startsWith('ar'));
    if (arV) utt.voice = arV;
    window.speechSynthesis.speak(utt);
  }
}

function closePopup() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('popup').style.display   = 'none';
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// Preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ══ HELPERS ═══════════════════════════════════════════════════════════════════
const toAr = n => String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

function firstConsonant(str) {
  for (const ch of str) if (/[ء-ي]/.test(ch)) return ch;
  return '';
}

// ══ TAJWEED ANALYSIS ══════════════════════════════════════════════════════════
function analyze(word, nextWord) {
  // غنة: ن or م مشددة
  const gh = word.match(/([نم])ّ/);
  if (gh) return { cls: 'gh', lbl: 'غنة', rsn: `${gh[1]==='ن'?'نون':'ميم'} مشددة` };

  // قلقلة: حرف قلقلة + سكون
  const ql = word.match(/([قطبجد])ْ/);
  if (ql) return { cls: 'ql', lbl: 'قلقلة', rsn: `"${ql[1]}" ساكنة` };

  // نون ساكنة داخل الكلمة
  const ni = word.indexOf('ن' + SKN);
  if (ni !== -1) {
    const fl = firstConsonant(word.slice(ni + 2));
    const r  = noonRule(fl, 'ن ساكنة');
    if (r) return r;
  }

  // ميم ساكنة داخل الكلمة
  const mi = word.indexOf('م' + SKN);
  if (mi !== -1) {
    const fl = firstConsonant(word.slice(mi + 2));
    if (fl === 'ب') return { cls: 'iks', lbl: 'إخفاء شفوي', rsn: 'م ساكنة + ب' };
    if (fl === 'م') return { cls: 'idm', lbl: 'إدغام شفوي', rsn: 'م ساكنة + م' };
  }

  // نون ساكنة آخر الكلمة أو تنوين + أول الكلمة التالية
  const endsNS = /نْ[ً-ٍ]?$/.test(word);
  const hasTN  = /[ًٌٍ]/.test(word);
  if ((endsNS || hasTN) && nextWord) {
    let nw = nextWord.replace(/^[وفبلك][َُِ]?/, '');
    let fl = firstConsonant(nw);
    if ((fl === 'ا' || fl === 'ٱ') && /^[اٱ]ل/.test(nw)) fl = 'ل';
    const r = noonRule(fl, hasTN ? 'تنوين' : 'ن ساكنة');
    if (r) return r;
  }

  // ميم ساكنة آخر الكلمة + أول التالية
  if (/مْ$/.test(word) && nextWord) {
    const fl = firstConsonant(nextWord);
    if (fl === 'ب') return { cls: 'iks', lbl: 'إخفاء شفوي', rsn: 'م ساكنة + ب' };
    if (fl === 'م') return { cls: 'idm', lbl: 'إدغام شفوي', rsn: 'م ساكنة + م' };
  }
  return null;
}

function noonRule(fl, src) {
  if (!fl) return null;
  if (fl === 'ب')   return { cls: 'iq',  lbl: 'إقلاب',          rsn: `${src} + ب` };
  if (IG.has(fl))   return { cls: 'idg', lbl: 'إدغام بغنة',     rsn: `${src} + "${fl}"` };
  if (IB.has(fl))   return { cls: 'idb', lbl: 'إدغام بغير غنة', rsn: `${src} + "${fl}"` };
  if (IZ.has(fl))   return { cls: 'it',  lbl: 'إظهار حلقي',     rsn: `${src} + "${fl}"` };
  if (fl.trim())    return { cls: 'ikh', lbl: 'إخفاء',           rsn: `${src} + "${fl}"` };
  return null;
}

// ══ WORD HTML ══════════════════════════════════════════════════════════════════
function wordHTML(text, rule) {
  if (rule) {
    return `<span class="tw ${rule.cls}">` +
      `<span class="tw-ann">` +
        `<span class="tw-label" data-cls="${rule.cls}" data-lbl="${rule.lbl}" data-rsn="${rule.rsn.replace(/"/g,"&quot;")}">${rule.lbl}</span>` +
        `<span class="tw-reason">${rule.rsn}</span>` +
      `</span>` +
      `<span class="tw-text">${text}</span>` +
    `</span>`;
  }
  return `<span class="tw"><span class="tw-ann"></span><span class="tw-text">${text}</span></span>`;
}

// ══ STATE ══════════════════════════════════════════════════════════════════════
let curPage = 1, fontSize = 22;
const cache = {};

function changeFS(d) {
  fontSize = Math.max(14, Math.min(40, fontSize + d));
  document.documentElement.style.setProperty('--fs', fontSize + 'px');
  document.getElementById('fsLabel').textContent = fontSize + 'px';
}

function go(d) {
  const p = curPage + d;
  if (p < 1 || p > TOTAL) return;
  curPage = p; loadSpread();
}

function syncNav() {
  const txt = `صفحة ${toAr(curPage)} — ${toAr(Math.min(curPage+1,TOTAL))} | من ${toAr(TOTAL)} صفحة`;
  document.getElementById('pinfo').textContent  = txt;
  document.getElementById('pinfo2').textContent = txt;
  document.getElementById('prevBtn').disabled = curPage <= 1;
  document.getElementById('nextBtn').disabled = curPage >= TOTAL - 1;
}

// ══ FETCH (qurancdn word-by-word with line_number) ════════════════════════════
async function fetchPage(num) {
  if (cache[num]) return cache[num];
  if (num < 1 || num > TOTAL) return null;
  try {
    const r = await fetch(QCDN + num + QCDN_FIELDS);
    const j = await r.json();
    if (j && j.verses) { cache[num] = j; return j; }
  } catch(_) {}
  return null;
}

// ══ RENDER PAGE (15 lines) ════════════════════════════════════════════════════
function renderPage(data) {
  if (!data || !data.verses?.length)
    return '<div class="msg">تعذّر التحميل — تحقق من الإنترنت</div>';

  const verses  = data.verses;
  const pgNum   = verses[0].page_number;
  const juzNum  = verses[0].juz_number;

  // ① flatten all words with their verse info
  const allWords = [];
  verses.forEach(v => {
    const [s, a] = v.verse_key.split(':').map(Number);
    (v.words || []).forEach(w => allWords.push({ ...w, surah: s, ayah: a }));
  });

  // ② group by line_number (1–15)
  const byLine = {};
  allWords.forEach(w => {
    const ln = w.line_number || 1;
    if (!byLine[ln]) byLine[ln] = [];
    byLine[ln].push(w);
  });

  // ③ determine max line
  const maxLine = Math.max(15, ...Object.keys(byLine).map(Number));

  // ④ build HTML
  let html = `<div class="pg-header">جزء ${toAr(juzNum)} &nbsp;·&nbsp; صفحة ${toAr(pgNum)}</div>`;
  html += `<div class="lines-wrap">`;

  for (let ln = 1; ln <= Math.min(maxLine, 15); ln++) {
    const words = byLine[ln] || [];

    // detect special lines (surah name)
    const isSurahName = words.length > 0 &&
      words.every(w => w.char_type_name === 'chapter-number' || w.char_type_name === 'surah-name' || w.char_type_name === 'word' && (w.text_uthmani || '').includes('سورة'));

    // detect basmala / short lines → center them
    const isCenter = words.length <= 6 ||
      words.some(w => (w.text_uthmani || '').includes('بِسۡمِ') || (w.text_uthmani || '').includes('بِسْمِ'));

    html += `<div class="quran-line${isCenter ? ' center' : ''}" dir="rtl">`;

    words.forEach((word, wi) => {
      const nextWord = allWords[allWords.indexOf(word) + 1];
      const nextTxt  = nextWord ? (nextWord.text_uthmani || '') : '';
      const txt      = word.text_uthmani || '';
      const ctype    = word.char_type_name || 'word';

      if (ctype === 'end') {
        // ayah end marker
        html += `<span class="anum" data-s="${word.surah}" data-a="${word.ayah}" title="اضغط للاستماع">﴿${toAr(word.ayah)}﴾</span>`;
      } else {
        const rule = ctype === 'word' ? analyze(txt, nextTxt) : null;
        html += wordHTML(txt, rule);
      }
    });

    html += `</div>`;
  }

  html += `</div>`;
  html += `<div class="pg-footer">• اضغط اسم الحكم للشرح | اضغط ﴿رقم الآية﴾ للاستماع •</div>`;
  return html;
}

// ══ LOAD SPREAD ═══════════════════════════════════════════════════════════════
async function loadSpread() {
  syncNav();
  const rEl = document.getElementById('pageRight');
  const lEl = document.getElementById('pageLeft');
  rEl.innerHTML = '<div class="msg">جارٍ التحميل…</div>';
  lEl.innerHTML = '<div class="msg">جارٍ التحميل…</div>';

  const [rd, ld] = await Promise.all([fetchPage(curPage), fetchPage(curPage + 1)]);
  rEl.innerHTML = renderPage(rd);
  lEl.innerHTML = curPage + 1 <= TOTAL ? renderPage(ld) : '';

  // ① bind ayah numbers → Quran audio
  document.querySelectorAll('.anum').forEach(el => {
    el.addEventListener('click', () => playAyah(+el.dataset.s, +el.dataset.a));
  });

  // ② bind tajweed labels → popup + speech
  document.querySelectorAll('.tw-label').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      showPopup(el.dataset.cls, el.dataset.lbl, el.dataset.rsn);
    });
  });
}

// ══ AUDIO ══════════════════════════════════════════════════════════════════════
function playAyah(s, a) {
  const sh = document.getElementById('sheikhSel').value;
  document.getElementById('audio').src =
    `${EVA}${sh}/${String(s).padStart(3,'0')}${String(a).padStart(3,'0')}.mp3`;
  document.getElementById('audio').play().catch(()=>{});
}

loadSpread();
</script>
