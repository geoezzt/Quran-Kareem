<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم — مصحف التجويد</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; --fs: 22px; --gold: #c8a951; --page-bg: #fdf8ed; --border: #9b7722; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1c1008; font-family: 'Scheherazade New','Traditional Arabic',serif; direction: rtl; min-height: 100vh; }
    header { background: linear-gradient(135deg,#0c3520,#155233); padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; border-bottom: 2px solid var(--gold); }
    .hdr-title { color: var(--gold); font-size: 1.3rem; font-weight: 700; }
    .hdr-title small { display: block; font-size: 0.63rem; color: #aaa; font-family: sans-serif; font-weight: 400; }
    .hdr-ctrl { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .font-box { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 4px 10px; }
    .font-box span { color: #ddd; font-size: 0.75rem; font-family: sans-serif; min-width: 44px; text-align: center; }
    .ibtn { background: rgba(255,255,255,.15); border: none; color: #fff; width: 26px; height: 26px; border-radius: 5px; font-size: 1.1rem; cursor: pointer; }
    .ibtn:hover { background: rgba(255,255,255,.3); }
    select { padding: 5px 9px; border-radius: 8px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); color: #fff; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
    select option { background: #1a1a1a; }
    audio { height: 32px; width: 175px; }
    .legend { background: rgba(0,0,0,.4); padding: 6px 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; border-bottom: 1px solid rgba(255,255,255,.06); }
    .li { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: #ccc; }
    .lc { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-note { color: #888; font-size: 0.67rem; font-family: sans-serif; }
    .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 14px; background: rgba(0,0,0,.35); }
    .nbtn { background: var(--gold); color: #1a0e00; border: none; padding: 5px 14px; border-radius: 7px; cursor: pointer; font-family: sans-serif; font-weight: bold; font-size: 0.82rem; }
    .nbtn:hover { filter: brightness(1.1); }
    .nbtn:disabled { opacity: .3; cursor: not-allowed; }
    .pinfo { color: var(--gold); font-family: sans-serif; font-size: 0.78rem; text-align: center; }
    .spread { display: flex; justify-content: center; gap: 8px; padding: 10px 6px; max-width: 1380px; margin: 0 auto; }
    .mpage { background: var(--page-bg); border: 3px solid var(--border); border-radius: 3px; width: 48%; max-width: 590px; padding: 12px 18px 8px; position: relative; box-shadow: 4px 4px 18px rgba(0,0,0,.5); display: flex; flex-direction: column; min-height: 78vh; }
    .mpage::before { content:''; position: absolute; inset: 5px; border: 1px solid #c8a95135; pointer-events: none; }
    .pg-header, .pg-footer { text-align: center; color: #7a5510; font-size: 0.63rem; font-family: sans-serif; padding: 3px 0; flex-shrink: 0; }
    .pg-header { border-bottom: 1px solid #c8a95125; margin-bottom: 4px; }
    .pg-footer { border-top: 1px solid #c8a95125; margin-top: 4px; }
    .lines-wrap { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .quran-line { display: flex; flex-direction: row; justify-content: space-between; align-items: flex-end; direction: rtl; padding: 0 2px; flex: 1; }
    .quran-line.center { justify-content: center; gap: 4px; }
    .surah-bar { text-align: center; font-size: 0.78em; font-weight: 700; color: #4a2800; border-top: 1px solid #c8a95155; border-bottom: 1px solid #c8a95155; padding: 1px 0; display: flex; align-items: center; justify-content: center; flex: 1; }
    .tw { display: inline-flex; flex-direction: column; align-items: center; }
    .tw-ann { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 20px; margin-bottom: 1px; }
    .tw-label { font-size: 0.37rem; font-weight: bold; padding: 1px 4px; border-radius: 3px; color: #fff; white-space: nowrap; font-family: 'Scheherazade New', serif; cursor: pointer; transition: transform .1s, filter .15s; user-select: none; line-height: 1.4; }
    .tw-label:hover { filter: brightness(1.2); transform: scale(1.1); }
    .tw-label:active { transform: scale(.9); }
    .tw-reason { font-size: 0.3rem; color: #999; white-space: nowrap; line-height: 1.2; font-family: 'Scheherazade New', serif; }
    .tw-text { font-size: var(--fs); line-height: 1.1; white-space: nowrap; }
    .ikh .tw-label { background: #217a21; } .ikh .tw-text { color: #217a21; }
    .iq  .tw-label { background: #660077; } .iq  .tw-text { color: #660077; }
    .idg .tw-label { background: #0070aa; } .idg .tw-text { color: #0070aa; }
    .idb .tw-label { background: #005e50; } .idb .tw-text { color: #005e50; }
    .it  .tw-label { background: #5c3a10; } .it  .tw-text { color: #5c3a10; }
    .ql  .tw-label { background: #7a0040; } .ql  .tw-text { color: #7a0040; }
    .gh  .tw-label { background: #b01060; } .gh  .tw-text { color: #b01060; }
    .iks .tw-label { background: #9900aa; } .iks .tw-text { color: #9900aa; }
    .idm .tw-label { background: #004400; } .idm .tw-text { color: #004400; }
    .anum { font-size: 0.5em; color: #8b6512; cursor: pointer; margin: 0 1px; font-family: 'Scheherazade New', serif; flex-shrink: 0; align-self: flex-end; }
    .anum:hover { color: #c8a951; }
    #overlay { display:none; position:fixed; inset:0; z-index:9998; background: rgba(0,0,0,.4); }
    #popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; color:#fff; padding:18px 22px; border-radius:14px; border:2px solid var(--gold); z-index:9999; min-width:270px; max-width:340px; text-align:right; direction:rtl; box-shadow:0 10px 40px rgba(0,0,0,.8); animation:popIn .2s ease; }
    @keyframes popIn { from{transform:translate(-50%,-50%) scale(.8);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }
    #popup .pop-rule { font-size:1.4rem; font-weight:bold; color:#f0d060; margin-bottom:6px; }
    #popup .pop-rsn  { font-size:0.78rem; color:#aaa; margin-bottom:10px; font-family:sans-serif; }
    #popup .pop-body { font-size:0.9rem; color:#ddd; line-height:1.9; }
    #popup .pop-close { position:absolute; top:10px; left:14px; background:none; border:none; color:#888; font-size:1rem; cursor:pointer; }
    #popup .pop-close:hover { color:#fff; }
    .msg { text-align:center; color:#888; font-family:sans-serif; font-size:.85rem; padding:30px 10px; }
    @media(max-width:720px){ .spread{flex-direction:column;align-items:center} .mpage{width:100%;max-width:100%} audio{width:130px} }
  </style>
</head>
<body>

<div id="overlay" onclick="closePopup()"></div>
<div id="popup">
  <button class="pop-close" onclick="closePopup()">&#10005;</button>
  <div class="pop-rule" id="popRule"></div>
  <div class="pop-rsn"  id="popRsn"></div>
  <div class="pop-body" id="popBody"></div>
</div>

<header>
  <div class="hdr-title">القرآن الكريم <small>15 سطراً كالمصحف &bull; اضغط اسم الحكم للشرح &bull; اضغط الآية للاستماع</small></div>
  <div class="hdr-ctrl">
    <div class="font-box">
      <button class="ibtn" onclick="changeFS(-2)">&#8722;</button>
      <span id="fsLabel">22px</span>
      <button class="ibtn" onclick="changeFS(+2)">+</button>
    </div>
    <select id="sheikhSel">
      <option value="Alafasy_128kbps">مشاري راشد العفاسي</option>
      <option value="Abdul_Basit_Murattal_192kbps">عبد الباسط عبد الصمد</option>
      <option value="Husary_128kbps">محمود خليل الحصري</option>
      <option value="Minshawi_Murattal_128kbps">محمد صديق المنشاوي</option>
      <option value="Ghamadi_40kbps">سعد الغامدي</option>
    </select>
    <audio id="audio" controls></audio>
  </div>
</header>

<div class="legend">
  <div class="li"><span class="lc" style="background:#217a21"></span>إخفاء</div>
  <div class="li"><span class="lc" style="background:#660077"></span>إقلاب</div>
  <div class="li"><span class="lc" style="background:#0070aa"></span>إدغام بغنة</div>
  <div class="li"><span class="lc" style="background:#005e50"></span>إدغام بغير غنة</div>
  <div class="li"><span class="lc" style="background:#9900aa"></span>إخفاء شفوي</div>
  <div class="li"><span class="lc" style="background:#004400"></span>إدغام شفوي</div>
  <div class="li"><span class="lc" style="background:#b01060"></span>غنة</div>
  <div class="li"><span class="lc" style="background:#7a0040"></span>قلقلة</div>
  <div class="li"><span class="lc" style="background:#5c3a10"></span>إظهار حلقي</div>
  <span class="legend-note">اضغط على اسم الحكم للشرح</span>
</div>

<div class="nav-bar">
  <button class="nbtn" id="prevBtn" onclick="go(-2)" disabled>&#9668; السابق</button>
  <div class="pinfo" id="pinfo">&#8212;</div>
  <button class="nbtn" id="nextBtn" onclick="go(+2)">التالي &#9658;</button>
</div>
<div class="spread">
  <div class="mpage" id="pageRight"><div class="msg">جارٍ التحميل&#8230;</div></div>
  <div class="mpage" id="pageLeft" ><div class="msg">جارٍ التحميل&#8230;</div></div>
</div>
<div class="nav-bar">
  <button class="nbtn" onclick="go(-2)">&#9668; السابق</button>
  <div class="pinfo" id="pinfo2">&#8212;</div>
  <button class="nbtn" onclick="go(+2)">التالي &#9658;</button>
</div>

<script>
var TOTAL=604,LINES=15;
var API='https://api.alquran.cloud/v1/page/';
var EVA='https://everyayah.com/data/';
var IG=new Set([...'ينمو']),IB=new Set([...'لر']),IZ=new Set([...'ءهعغحخ']);
var SKN='ْ';

var EXP={
  ikh:{t:'إخفاء',b:'النون الساكنة أو التنوين إذا جاء بعدهما أحد حروف الإخفاء الخمسة عشر تُنطق بغنة مع إخفاء النون. الحروف: ت ث ج د ذ ز س ش ص ض ط ظ ف ق ك'},
  iq: {t:'إقلاب',b:'إذا جاء بعد النون الساكنة أو التنوين حرف الباء، وجب قلبهما ميماً مع الغنة والإخفاء. مثال: مِن بَعْد'},
  idg:{t:'إدغام بغنة',b:'إذا جاء بعد النون الساكنة أو التنوين أحد حروف (ي ن م و) وجب إدغامهما مع بقاء الغنة. مثال: هُدًى لِّلْمُتَّقِينَ'},
  idb:{t:'إدغام بغير غنة',b:'إذا جاء بعد النون الساكنة أو التنوين حرف اللام أو الراء، وجب إدغامهما بدون غنة. مثال: مِن رَّبِّهِمْ'},
  it: {t:'إظهار حلقي',b:'إذا جاء بعد النون الساكنة أو التنوين أحد حروف الحلق (ء ه ع غ ح خ) وجب إظهارهما واضحَين. مثال: أَنْعَمْتَ'},
  ql: {t:'قلقلة',b:'اهتزاز في الصوت عند النطق بأحد حروف القلقلة (ق ط ب ج د) حال سكونها. مثال: يَخْلُقكُّم'},
  gh: {t:'غنة',b:'صوت أغنّ يخرج من الخيشوم عند النطق بالنون أو الميم المشددتين، ومقدارها حركتان. مثال: إنَّ - أمَّا'},
  iks:{t:'إخفاء شفوي',b:'إذا جاء بعد الميم الساكنة حرف الباء، وجب إخفاء الميم مع الغنة. مثال: تَرْمِيهِم بِحِجَارَة'},
  idm:{t:'إدغام شفوي',b:'إذا جاء بعد الميم الساكنة ميم أخرى وجب إدغامهما مع الغنة. مثال: لَهُم مَّا'}
};

var popTimer;
function showPopup(cls,lbl,rsn){
  var e=EXP[cls]||{t:lbl,b:rsn};
  document.getElementById('popRule').textContent=e.t;
  document.getElementById('popRsn').textContent=rsn;
  document.getElementById('popBody').textContent=e.b;
  document.getElementById('overlay').style.display='block';
  document.getElementById('popup').style.display='block';
  clearTimeout(popTimer);popTimer=setTimeout(closePopup,9000);
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    var utt=new SpeechSynthesisUtterance(e.t+'. '+e.b);
    utt.lang='ar-SA';utt.rate=0.88;
    var vv=window.speechSynthesis.getVoices();
    var av=vv.find(function(v){return v.lang&&v.lang.startsWith('ar');});
    if(av)utt.voice=av;
    window.speechSynthesis.speak(utt);
  }
}
function closePopup(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('popup').style.display='none';
  if(window.speechSynthesis)window.speechSynthesis.cancel();
}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
}

function toAr(n){return String(n).replace(/\d/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[d];});}
function fc(s){for(var i=0;i<s.length;i++){if(/[ء-ي]/.test(s[i]))return s[i];}return '';}

function analyze(w,nw){
  var gh=w.match(/([نم])ّ/);
  if(gh)return{cls:'gh',lbl:'غنة',rsn:(gh[1]==='ن'?'نون':'ميم')+' مشددة'};
  var ql=w.match(/([قطبجد])ْ/);
  if(ql)return{cls:'ql',lbl:'قلقلة',rsn:'"'+ql[1]+'" ساكنة'};
  var ni=w.indexOf('ن'+SKN);
  if(ni!==-1){var r=nr(fc(w.slice(ni+2)),'ن ساكنة');if(r)return r;}
  var mi=w.indexOf('م'+SKN);
  if(mi!==-1){var fl=fc(w.slice(mi+2));if(fl==='ب')return{cls:'iks',lbl:'إخفاء شفوي',rsn:'م ساكنة + ب'};if(fl==='م')return{cls:'idm',lbl:'إدغام شفوي',rsn:'م ساكنة + م'};}
  var eN=/نْ[ً-ٍ]?$/.test(w),hT=/[ًٌٍ]/.test(w);
  if((eN||hT)&&nw){
    var n2=nw.replace(/^[وفبلك][َُِ]?/,'');
    var fl2=fc(n2);
    if((fl2==='ا'||fl2==='ٱ')&&/^[اٱ]ل/.test(n2))fl2='ل';
    var r2=nr(fl2,hT?'تنوين':'ن ساكنة');if(r2)return r2;
  }
  if(/مْ$/.test(w)&&nw){var fl3=fc(nw);if(fl3==='ب')return{cls:'iks',lbl:'إخفاء شفوي',rsn:'م ساكنة + ب'};if(fl3==='م')return{cls:'idm',lbl:'إدغام شفوي',rsn:'م ساكنة + م'};}
  return null;
}
function nr(fl,src){
  if(!fl)return null;
  if(fl==='ب')return{cls:'iq',lbl:'إقلاب',rsn:src+' + ب'};
  if(IG.has(fl))return{cls:'idg',lbl:'إدغام بغنة',rsn:src+' + "'+fl+'"'};
  if(IB.has(fl))return{cls:'idb',lbl:'إدغام بغير غنة',rsn:src+' + "'+fl+'"'};
  if(IZ.has(fl))return{cls:'it',lbl:'إظهار حلقي',rsn:src+' + "'+fl+'"'};
  if(fl.trim())return{cls:'ikh',lbl:'إخفاء',rsn:src+' + "'+fl+'"'};
  return null;
}

function wHTML(text,rule){
  if(rule){
    var r=rule.rsn.replace(/"/g,'&quot;');
    return '<span class="tw '+rule.cls+'"><span class="tw-ann"><span class="tw-label" data-cls="'+rule.cls+'" data-lbl="'+rule.lbl+'" data-rsn="'+r+'">'+rule.lbl+'</span><span class="tw-reason">'+rule.rsn+'</span></span><span class="tw-text">'+text+'</span></span>';
  }
  return '<span class="tw"><span class="tw-ann"></span><span class="tw-text">'+text+'</span></span>';
}

var curPage=1,fontSize=22,cache={};

function changeFS(d){fontSize=Math.max(14,Math.min(40,fontSize+d));document.documentElement.style.setProperty('--fs',fontSize+'px');document.getElementById('fsLabel').textContent=fontSize+'px';}
function go(d){var p=curPage+d;if(p<1||p>TOTAL)return;curPage=p;loadSpread();}
function syncNav(){
  var t='صفحة '+toAr(curPage)+' — '+toAr(Math.min(curPage+1,TOTAL))+' | من '+toAr(TOTAL)+' صفحة';
  document.getElementById('pinfo').textContent=t;
  document.getElementById('pinfo2').textContent=t;
  document.getElementById('prevBtn').disabled=curPage<=1;
  document.getElementById('nextBtn').disabled=curPage>=TOTAL-1;
}

async function fetchPage(num){
  if(cache[num])return cache[num];
  if(num<1||num>TOTAL)return null;
  try{
    var r=await fetch(API+num+'/quran-uthmani');
    var j=await r.json();
    if(j.code===200){cache[num]=j.data;return j.data;}
  }catch(e){}
  return null;
}

function renderPage(data){
  if(!data||!data.ayahs||!data.ayahs.length)return '<div class="msg">تعذّر التحميل &mdash; تحقق من الإنترنت</div>';
  var ayahs=data.ayahs,pgNum=ayahs[0].page,juzNum=ayahs[0].juz;
  var tokens=[],lastSurah=-1;
  ayahs.forEach(function(ayah,ai){
    var sn=ayah.surah.number,an=ayah.numberInSurah;
    if(sn!==lastSurah){
      lastSurah=sn;
      tokens.push({type:'surah',text:ayah.surah.name});
      if(sn!==9&&sn!==1&&an===1)tokens.push({type:'basmala',text:'بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ'});
    }
    var words=ayah.text.split(/\s+/).filter(Boolean);
    var naf=ayahs[ai+1]?ayahs[ai+1].text.split(/\s+/)[0]:'';
    words.forEach(function(w,wi){
      var nw=wi<words.length-1?words[wi+1]:naf;
      tokens.push({type:'word',text:w,rule:analyze(w,nw),surah:sn,ayah:an});
    });
    tokens.push({type:'end',surah:sn,ayah:an});
  });

  var lines=[],wordBuf=[];
  function flush(){
    if(!wordBuf.length)return;
    var left=LINES-lines.length;
    if(left<=0){lines.push(wordBuf.slice());wordBuf=[];return;}
    var per=Math.ceil(wordBuf.length/left);
    while(wordBuf.length)lines.push(wordBuf.splice(0,per));
    wordBuf=[];
  }
  tokens.forEach(function(tok){
    if(tok.type==='surah'||tok.type==='basmala'){flush();if(lines.length<LINES)lines.push([tok]);}
    else wordBuf.push(tok);
  });
  flush();
  while(lines.length<LINES)lines.push([]);

  var html='<div class="pg-header">جزء '+toAr(juzNum)+' &nbsp;&middot;&nbsp; صفحة '+toAr(pgNum)+'</div><div class="lines-wrap">';
  lines.slice(0,LINES).forEach(function(line){
    if(!line.length){html+='<div class="quran-line"></div>';return;}
    var f=line[0];
    if(f.type==='surah'){html+='<div class="quran-line surah-bar">سورة '+f.text+'</div>';return;}
    if(f.type==='basmala'){
      html+='<div class="quran-line center">';
      f.text.split(/\s+/).forEach(function(w){html+=wHTML(w,null);});
      html+='</div>';return;
    }
    var short=line.length<=5;
    html+='<div class="quran-line'+(short?' center':'')+'\">';
    line.forEach(function(tok){
      if(tok.type==='end')html+='<span class="anum" data-s="'+tok.surah+'" data-a="'+tok.ayah+'">\u﴿'+toAr(tok.ayah)+'\u﴾</span>';
      else html+=wHTML(tok.text,tok.rule);
    });
    html+='</div>';
  });
  html+='</div><div class="pg-footer">اضغط اسم الحكم للشرح | اضغط الآية للاستماع</div>';
  return html;
}

async function loadSpread(){
  syncNav();
  var rEl=document.getElementById('pageRight'),lEl=document.getElementById('pageLeft');
  rEl.innerHTML='<div class="msg">جارٍ التحميل&#8230;</div>';
  lEl.innerHTML='<div class="msg">جارٍ التحميل&#8230;</div>';
  var results=await Promise.all([fetchPage(curPage),fetchPage(curPage+1)]);
  rEl.innerHTML=renderPage(results[0]);
  lEl.innerHTML=curPage+1<=TOTAL?renderPage(results[1]):'';
  document.querySelectorAll('.anum').forEach(function(el){
    el.addEventListener('click',function(){playAyah(+el.dataset.s,+el.dataset.a);});
  });
  document.querySelectorAll('.tw-label').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      showPopup(el.dataset.cls,el.dataset.lbl,el.dataset.rsn);
    });
  });
}

function playAyah(s,a){
  var sh=document.getElementById('sheikhSel').value;
  var el=document.getElementById('audio');
