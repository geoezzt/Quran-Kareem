<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم — مصحف التجويد</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; --fs: 24px; --gold: #c8a951; --page-bg: #fdf8ed; --border: #9b7722; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1c1008; font-family: 'Scheherazade New','Traditional Arabic',serif; direction: rtl; min-height: 100vh; }

    /* HEADER */
    header { background: linear-gradient(135deg,#0c3520,#155233); padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; border-bottom: 2px solid var(--gold); }
    .hdr-title { color: var(--gold); font-size: 1.4rem; font-weight: 700; }
    .hdr-title small { display: block; font-size: 0.68rem; color: #aaa; font-family: sans-serif; font-weight: 400; }
    .hdr-ctrl { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .font-box { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 4px 10px; }
    .font-box span { color: #ddd; font-size: 0.78rem; font-family: sans-serif; min-width: 48px; text-align: center; }
    .ibtn { background: rgba(255,255,255,.15); border: none; color: #fff; width: 26px; height: 26px; border-radius: 5px; font-size: 1.1rem; cursor: pointer; }
    .ibtn:hover { background: rgba(255,255,255,.3); }
    select { padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); color: #fff; font-family: inherit; font-size: 0.88rem; cursor: pointer; }
    select option { background: #1a1a1a; }
    audio { height: 34px; width: 185px; }

    /* LEGEND */
    .legend { background: rgba(0,0,0,.4); padding: 7px 14px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; align-items: center; border-bottom: 1px solid rgba(255,255,255,.06); }
    .li { display: flex; align-items: center; gap: 4px; font-size: 0.76rem; color: #ccc; }
    .lc { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-note { color: #888; font-size: 0.7rem; font-family: sans-serif; }

    /* NAV */
    .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; background: rgba(0,0,0,.35); }
    .nbtn { background: var(--gold); color: #1a0e00; border: none; padding: 5px 16px; border-radius: 7px; cursor: pointer; font-family: sans-serif; font-weight: bold; font-size: 0.85rem; }
    .nbtn:hover { filter: brightness(1.1); }
    .nbtn:disabled { opacity: .3; cursor: not-allowed; }
    .pinfo { color: var(--gold); font-family: sans-serif; font-size: 0.8rem; text-align: center; }

    /* SPREAD */
    .spread { display: flex; justify-content: center; gap: 10px; padding: 12px 8px; max-width: 1380px; margin: 0 auto; }
    .mpage { background: var(--page-bg); border: 3px solid var(--border); border-radius: 3px; width: 48%; max-width: 590px; min-height: 76vh; padding: 18px 22px; position: relative; box-shadow: 4px 4px 18px rgba(0,0,0,.5); display: flex; flex-direction: column; }
    .mpage::before { content:''; position: absolute; inset: 6px; border: 1px solid #c8a95140; pointer-events: none; }
    .pg-header,.pg-footer { text-align: center; color: #7a5510; font-size: 0.68rem; font-family: sans-serif; padding: 3px 0; }
    .pg-header { border-bottom: 1px solid #c8a95133; margin-bottom: 8px; }
    .pg-footer { border-top: 1px solid #c8a95133; margin-top: 8px; }
    .surah-bar { text-align: center; font-size: 1.05em; font-weight: 700; color: #4a2800; padding: 4px 0; margin: 5px 0; border-top: 1px solid #c8a95140; border-bottom: 1px solid #c8a95140; }
    .basmala { text-align: center; font-size: 0.95em; color: #1a1a1a; margin: 5px 0 8px; }

    /* VERSE FLOW */
    .verse-flow { flex: 1; font-size: var(--fs); line-height: 3.8; text-align: justify; color: #111; direction: rtl; }

    /* TAJWEED WORD */
    .tw { display: inline-flex; flex-direction: column; align-items: center; vertical-align: bottom; margin: 0 1px; }
    .tw-ann { height: 28px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; margin-bottom: 1px; }

    /* label is clickable — speaks the rule */
    .tw-label {
      font-size: 0.44rem; font-weight: bold; padding: 1px 5px; border-radius: 3px;
      color: #fff; white-space: nowrap; line-height: 1.4;
      font-family: 'Scheherazade New', serif;
      cursor: pointer;
      transition: transform .1s, opacity .15s;
      user-select: none;
    }
    .tw-label:hover  { opacity: .82; transform: scale(1.08); }
    .tw-label:active { transform: scale(.95); }

    .tw-reason { font-size: 0.37rem; color: #777; white-space: nowrap; line-height: 1.3; font-family: 'Scheherazade New', serif; }
    .tw-text   { font-size: var(--fs); line-height: 1.2; }

    /* RULE COLORS — no lam rules */
    .ikh .tw-label { background: #217a21; } .ikh .tw-text { color: #217a21; }
    .iq  .tw-label { background: #660077; } .iq  .tw-text { color: #660077; }
    .idg .tw-label { background: #0070aa; } .idg .tw-text { color: #0070aa; }
    .idb .tw-label { background: #005e50; } .idb .tw-text { color: #005e50; }
    .it  .tw-label { background: #5c3a10; } .it  .tw-text { color: #5c3a10; }
    .ql  .tw-label { background: #7a0040; } .ql  .tw-text { color: #7a0040; }
    .gh  .tw-label { background: #b01060; } .gh  .tw-text { color: #b01060; }
    .iks .tw-label { background: #9900aa; } .iks .tw-text { color: #9900aa; }
    .idm .tw-label { background: #004400; } .idm .tw-text { color: #004400; }

    /* AYAH NUMBER */
    .anum { display: inline; font-size: 0.52em; color: #7a5510; cursor: pointer; margin: 0 2px; vertical-align: middle; font-family: 'Scheherazade New', serif; }
    .anum:hover { color: #c8a951; }

    /* speaking pulse animation */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .speaking { animation: pulse .6s infinite; }

    .msg { text-align: center; color: #888; font-family: sans-serif; font-size: 0.88rem; padding: 30px 10px; }

    @media (max-width: 720px) {
      .spread { flex-direction: column; align-items: center; }
      .mpage  { width: 100%; max-width: 100%; }
      audio   { width: 140px; }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr-title">
    القرآن الكريم
    <small>مصحف التجويد الكامل — اضغط ﴿الآية﴾ للاستماع</small>
  </div>
  <div class="hdr-ctrl">
    <div class="font-box">
      <button class="ibtn" onclick="changeFS(-2)">−</button>
      <span id="fsLabel">24px</span>
      <button class="ibtn" onclick="changeFS(+2)">+</button>
    </div>
    <select id="sheikhSel">
      <option value="Alafasy_128kbps">مشاري راشد العفاسي</option>
      <option value="Abdul_Basit_Murattal_192kbps">عبد الباسط عبد الصمد</option>
      <option value="Husary_128kbps">محمود خليل الحصري</option>
      <option value="Minshawi_Murattal_128kbps">محمد صديق المنشاوي</option>
      <option value="Ghamadi_40kbps">سعد الغامدي</option>
    </select>
    <audio id="audio" controls></audio>
  </div>
</header>

<div class="legend">
  <div class="li"><span class="lc" style="background:#217a21"></span>إخفاء</div>
  <div class="li"><span class="lc" style="background:#660077"></span>إقلاب</div>
  <div class="li"><span class="lc" style="background:#0070aa"></span>إدغام بغنة</div>
  <div class="li"><span class="lc" style="background:#005e50"></span>إدغام بغير غنة</div>
  <div class="li"><span class="lc" style="background:#9900aa"></span>إخفاء شفوي</div>
  <div class="li"><span class="lc" style="background:#004400"></span>إدغام شفوي</div>
  <div class="li"><span class="lc" style="background:#b01060"></span>غنة</div>
  <div class="li"><span class="lc" style="background:#7a0040"></span>قلقلة</div>
  <div class="li"><span class="lc" style="background:#5c3a10"></span>إظهار حلقي</div>
  <span class="legend-note">🔊 اضغط على اسم الحكم ليُنطق لك</span>
</div>

<div class="nav-bar">
  <button class="nbtn" id="prevBtn" onclick="go(-2)" disabled>◄ السابق</button>
  <div class="pinfo" id="pinfo">—</div>
  <button class="nbtn" id="nextBtn" onclick="go(+2)">التالي ►</button>
</div>

<div class="spread">
  <div class="mpage" id="pageRight"><div class="msg">جارٍ التحميل…</div></div>
  <div class="mpage" id="pageLeft"><div class="msg">جارٍ التحميل…</div></div>
</div>

<div class="nav-bar">
  <button class="nbtn" onclick="go(-2)">◄ السابق</button>
  <div class="pinfo" id="pinfo2">—</div>
  <button class="nbtn" onclick="go(+2)">التالي ►</button>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const TOTAL = 604;
const API   = 'https://api.alquran.cloud/v1/page/';
const EVA   = 'https://everyayah.com/data/';

// ── Tajweed letter sets (no lam rules) ──────────────────────────────────────
const IG = new Set([...'ينمو']);    // إدغام بغنة
const IB = new Set([...'لر']);      // إدغام بغير غنة
const IZ = new Set([...'ءهعغحخ']); // إظهار حلقي
const QL = new Set([...'قطبجد']);  // قلقلة

const SKN = 'ْ'; // ْ sukun
const SHD = 'ّ'; // ّ shadda

// ── Speech synthesis ─────────────────────────────────────────────────────────
// Full explanation text spoken when user clicks a rule label
const RULE_SPEECH = {
  ikh: 'هنا إخفاء. النون الساكنة أو التنوين قبل حروف الإخفاء، تُنطق بغنة مع إخفاء النون.',
  iq:  'هنا إقلاب. النون الساكنة أو التنوين قبل حرف الباء، تُقلب إلى ميم مع الغنة.',
  idg: 'هنا إدغام بغنة. النون الساكنة أو التنوين قبل حروف يَنمو، تُدغم مع الغنة.',
  idb: 'هنا إدغام بغير غنة. النون الساكنة أو التنوين قبل اللام أو الراء، تُدغم بلا غنة.',
  it:  'هنا إظهار حلقي. النون الساكنة أو التنوين قبل حروف الحلق، تُظهر بوضوح.',
  ql:  'هنا قلقلة. حرف من حروف قطب جد ساكن، يُنطق باهتزاز.',
  gh:  'هنا غنة. النون أو الميم المشددة، تُنطق بغنة مقدارها حركتان.',
  iks: 'هنا إخفاء شفوي. الميم الساكنة قبل حرف الباء، تُخفى مع الغنة.',
  idm: 'هنا إدغام شفوي. الميم الساكنة قبل ميم، تُدغم مع الغنة.',
};

let currentUtterance = null;

function speakRule(cls, label, reason) {
  if (!window.speechSynthesis) return;

  // stop any ongoing speech
  window.speechSynthesis.cancel();

  const text = RULE_SPEECH[cls] || `${label}. ${reason}`;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ar-SA';
  utt.rate = 0.9;
  utt.pitch = 1;

  // try to pick an Arabic voice
  const voices = window.speechSynthesis.getVoices();
  const arVoice = voices.find(v => v.lang.startsWith('ar'));
  if (arVoice) utt.voice = arVoice;

  currentUtterance = utt;
  window.speechSynthesis.speak(utt);
}

// load voices (some browsers need this event)
window.speechSynthesis.onvoiceschanged = () => {};

// ── Helper ───────────────────────────────────────────────────────────────────
function firstConsonant(str) {
  for (const ch of str) {
    if (/[ء-ي]/.test(ch)) return ch;
  }
  return '';
}

function baseLetter(ch) {
  return ch.replace(/[ً-ٟ]/g, '');
}

// ── Tajweed analysis (no lam shamsiyya/qamariyya) ────────────────────────────
function analyze(word, nextWord) {

  // ① غنة: ن or م + shadda
  if (/[نم]ّ/.test(word)) {
    const m = word.match(/([نم])ّ/);
    return { cls: 'gh', lbl: 'غنة', rsn: `${m[1] === 'ن' ? 'نون' : 'ميم'} مشددة` };
  }

  // ② قلقلة: qalqala letter + sukun
  if (/[قطبجد]ْ/.test(word)) {
    const m = word.match(/([قطبجد])ْ/);
    return { cls: 'ql', lbl: 'قلقلة', rsn: `حرف القلقلة "${m[1]}" ساكن` };
  }

  // ③ noon sakin INSIDE word + following letter
  const nIdx = word.indexOf('ن' + SKN);
  if (nIdx !== -1) {
    const after = word.slice(nIdx + 2);
    const fl = firstConsonant(after);
    if (fl) {
      const r = noonRule(fl, 'ن ساكنة');
      if (r) return r;
    }
  }

  // ④ meem sakin INSIDE word + following letter
  const mIdx = word.indexOf('م' + SKN);
  if (mIdx !== -1) {
    const after = word.slice(mIdx + 2);
    const fl = firstConsonant(after);
    if (fl === 'ب') return { cls: 'iks', lbl: 'إخفاء شفوي', rsn: 'م ساكنة + ب' };
    if (fl === 'م') return { cls: 'idm', lbl: 'إدغام شفوي', rsn: 'م ساكنة + م' };
  }

  // ⑤ noon sakin at word END + first letter of next word
  const endsNS = /نْ[ً-ٍ]?$/.test(word);
  const hasTN  = /[ًٌٍ]/.test(word);

  if ((endsNS || hasTN) && nextWord) {
    let nw = nextWord;
    if (/^[وفبلك]/.test(nw)) nw = nw.slice(1).replace(/^[َُِ]/, '');
    let fl = firstConsonant(nw);
    if ((fl === 'ا' || fl === 'ٱ') && /^[اٱ]ل/.test(nw)) fl = 'ل';
    const r = noonRule(fl, hasTN ? 'تنوين' : 'ن ساكنة');
    if (r) return r;
  }

  // ⑥ meem sakin at word END + first letter of next word
  const endsMeemS = /مْ$/.test(word);
  if (endsMeemS && nextWord) {
    const fl = firstConsonant(nextWord);
    if (fl === 'ب') return { cls: 'iks', lbl: 'إخفاء شفوي', rsn: 'م ساكنة + ب' };
    if (fl === 'م') return { cls: 'idm', lbl: 'إدغام شفوي', rsn: 'م ساكنة + م' };
  }

  return null;
}

function noonRule(fl, src) {
  if (!fl) return null;
  const b = baseLetter(fl);
  if (b === 'ب')  return { cls: 'iq',  lbl: 'إقلاب',          rsn: `${src} + ب` };
  if (IG.has(b))       return { cls: 'idg', lbl: 'إدغام بغنة',     rsn: `${src} + "${b}"` };
  if (IB.has(b))       return { cls: 'idb', lbl: 'إدغام بغير غنة', rsn: `${src} + "${b}"` };
  if (IZ.has(b))       return { cls: 'it',  lbl: 'إظهار حلقي',     rsn: `${src} + "${b}"` };
  if (b && b !== ' ')  return { cls: 'ikh', lbl: 'إخفاء',           rsn: `${src} + "${b}"` };
  return null;
}

// ── Render a single word ──────────────────────────────────────────────────────
function wordHTML(text, rule) {
  if (rule) {
    // data-cls and data-rsn stored for speech on click
    return `<span class="tw ${rule.cls}">` +
      `<span class="tw-ann">` +
        `<span class="tw-label" data-cls="${rule.cls}" data-rsn="${rule.rsn}" data-lbl="${rule.lbl}">${rule.lbl}</span>` +
        `<span class="tw-reason">${rule.rsn}</span>` +
      `</span>` +
      `<span class="tw-text">${text}</span>` +
    `</span>`;
  }
  return `<span class="tw"><span class="tw-ann"></span><span class="tw-text">${text}</span></span>`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let curPage = 1, fontSize = 24;
const cache = {};
const toAr  = n => String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

function changeFS(d) {
  fontSize = Math.max(16, Math.min(46, fontSize + d));
  document.documentElement.style.setProperty('--fs', fontSize + 'px');
  document.getElementById('fsLabel').textContent = fontSize + 'px';
}

function go(d) {
  const p = curPage + d;
  if (p < 1 || p > TOTAL) return;
  curPage = p; loadSpread();
}

function syncNav() {
  const txt = `صفحة ${toAr(curPage)} — ${toAr(Math.min(curPage+1,TOTAL))} | من ${toAr(TOTAL)} صفحة`;
  document.getElementById('pinfo').textContent  = txt;
  document.getElementById('pinfo2').textContent = txt;
  document.getElementById('prevBtn').disabled = curPage <= 1;
  document.getElementById('nextBtn').disabled = curPage >= TOTAL - 1;
}

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchPage(num) {
  if (cache[num]) return cache[num];
  if (num < 1 || num > TOTAL) return null;
  try {
    const r = await fetch(API + num + '/quran-uthmani');
    const j = await r.json();
    if (j.code === 200) { cache[num] = j.data; return j.data; }
  } catch(_) {}
  return null;
}

// ── Render page ───────────────────────────────────────────────────────────────
function renderPage(data) {
  if (!data || !data.ayahs?.length) return '<div class="msg">تعذّر التحميل — تحقق من الإنترنت</div>';

  const ayahs  = data.ayahs;
  const pgNum  = ayahs[0].page;
  const juzNum = ayahs[0].juz;

  let html = `<div class="pg-header">جزء ${toAr(juzNum)} &nbsp;·&nbsp; صفحة ${toAr(pgNum)}</div><div class="verse-flow" dir="rtl">`;
  let lastSurah = -1;

  ayahs.forEach((ayah, ai) => {
    const sn = ayah.surah.number;
    const an = ayah.numberInSurah;

    if (sn !== lastSurah) {
      lastSurah = sn;
      html += `</div><div class="surah-bar">سورة ${ayah.surah.name}</div>`;
      if (sn !== 9 && sn !== 1 && an === 1)
        html += `<div class="basmala">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَـٰنِ ٱلرَّحِيمِ</div>`;
      html += `<div class="verse-flow" dir="rtl">`;
    }

    const words = ayah.text.split(/\s+/).filter(Boolean);
    const nextAyah = ayahs[ai + 1];
    const nextFirst = nextAyah ? nextAyah.text.split(/\s+/).filter(Boolean)[0] : '';

    words.forEach((word, wi) => {
      const nextWord = wi < words.length - 1 ? words[wi + 1] : nextFirst;
      html += wordHTML(word, analyze(word, nextWord)) + ' ';
    });

    html += `<span class="anum" data-s="${sn}" data-a="${an}" title="استمع للآية ${toAr(an)}">﴿${toAr(an)}﴾</span> `;
  });

  html += `</div><div class="pg-footer">• اضغط ﴿رقم الآية﴾ للاستماع | اضغط اسم الحكم ليُنطق 🔊 •</div>`;
  return html;
}

// ── Load spread ───────────────────────────────────────────────────────────────
async function loadSpread() {
  syncNav();
  const rEl = document.getElementById('pageRight');
  const lEl = document.getElementById('pageLeft');
  rEl.innerHTML = '<div class="msg">جارٍ التحميل…</div>';
  lEl.innerHTML = '<div class="msg">جارٍ التحميل…</div>';

  const [rd, ld] = await Promise.all([fetchPage(curPage), fetchPage(curPage + 1)]);
  rEl.innerHTML = renderPage(rd);
  lEl.innerHTML = curPage + 1 <= TOTAL ? renderPage(ld) : '';

  // bind ayah number clicks → audio
  document.querySelectorAll('.anum').forEach(el => {
    el.addEventListener('click', () => playAyah(+el.dataset.s, +el.dataset.a));
  });

  // bind tajweed label clicks → speech
  document.querySelectorAll('.tw-label').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const cls = el.dataset.cls;
      const lbl = el.dataset.lbl;
      const rsn = el.dataset.rsn;
      // visual feedback
      el.classList.add('speaking');
      speakRule(cls, lbl, rsn);
      setTimeout(() => el.classList.remove('speaking'), 2500);
    });
  });
}

// ── Audio (Quran recitation) ──────────────────────────────────────────────────
function playAyah(s, a) {
  const sh = document.getElementById('sheikhSel').value;
  document.getElementById('audio').src =
    `${EVA}${sh}/${String(s).padStart(3,'0')}${String(a).padStart(3,'0')}.mp3`;
  document.getElementById('audio').play();
}

loadSpread();
</script>
</body>
</html>
